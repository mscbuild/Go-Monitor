# config/server.yaml

# Port on which the server will run
server:
host: "0.0.0.0"
port: 8080

# Alert check interval (sec)
alert_check_interval: 10

# Alert thresholds
thresholds:
cpu: 90
memory: 85
disk: 90

# Telegram alerts
telegram:
bot_token: "YOUR_TELEGRAM_BOT_TOKEN"
chat_id: "YOUR_TELEGRAM_CHAT_ID"

# DBMS
database:
type: "postgres" # or "sqlite"
host: "localhost"
port: 5432
user: "postgres"
password: "pass"
dbname: "monitor"
sslmode: "disable"
