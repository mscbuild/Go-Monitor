 <!DOCTYPE html>
<html>
<head>
<title>Go Monitor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<h2>Server Metrics</h2>
<canvas id="cpuChart" width="600" height="200"></canvas>
<script>
const ctx = document.getElementById('cpuChart').getContext('2d');
let chart = new Chart(ctx, {type:'line',data:{labels:[],datasets:[{label:'CPU',data:[]}]}});
const ws = new WebSocket('ws://localhost:8080/ws');
ws.onmessage = function(event){
	const m = JSON.parse(event.data);
	chart.data.labels.push(new Date(m.Timestamp*1000).toLocaleTimeString());
	chart.data.datasets[0].data.push(m.CPU);
	if(chart.data.labels.length>20){chart.data.labels.shift();chart.data.datasets[0].data.shift();}
	chart.update();
}
</script>
</body>
</html>
